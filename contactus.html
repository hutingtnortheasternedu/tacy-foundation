<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tacy Foundation | Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="css/style.css" />

<script>
function capitalizeFirstLetter(value) {
  value = value.trim().toLowerCase();
  if (value.length === 0) return value;
  return value.charAt(0).toUpperCase() + value.slice(1);
}

function validateForm(event) {
  event.preventDefault();

  const firstName = document.getElementById("firstname");
  const lastName = document.getElementById("lastname");
  const city = document.getElementById("city");
  const email = document.getElementById("email");
  const zip = document.getElementById("zip");

  firstName.value = capitalizeFirstLetter(firstName.value);
  lastName.value = capitalizeFirstLetter(lastName.value);
  city.value = capitalizeFirstLetter(city.value);

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const zipPattern = /^\d{5}(-\d{4})?$/;

  if (!emailPattern.test(email.value)) {
    alert("Please enter a valid email address.");
    email.focus();
    return false;
  }

  if (!zipPattern.test(zip.value)) {
    alert("Please enter a valid ZIP code.");
    zip.focus();
    return false;
  }

  window.location.href = "thankyou.html";
  return true;
}
</script>
</head>

<body class="contact">

<header class="site-header">
<h1 class="site-title">Tacy Foundation</h1>
<p class="site-subtitle">Demo by Tingting Hu</p>
</header>

<nav class="top-nav">
<ul class="top-nav-list">
<li><a class="nav-link" href="index.html">Home</a></li>
<li><a class="nav-link" href="about.html">About Us</a></li>
<li><a class="nav-link" href="programs.html">Programs</a></li>
<li><a class="nav-link active" href="contactus.html">Contact Us</a></li>
</ul>
</nav>

<main class="contact-page">
<section class="contact-intro">
<h2 class="contact-title">Contact Us</h2>
<p class="contact-text">
Please complete the form below to contact the Tacy Foundation. Fields marked with * are required.
</p>
</section>

<section class="contact-form-wrapper">
<form class="contact-form" action="#" method="post" onsubmit="validateForm(event)">

<div class="form-row">
<label for="firstname">First Name *</label>
<input type="text" id="firstname" name="firstname" required minlength="2" maxlength="30" placeholder="Enter your first name" />
</div>

<div class="form-row">
<label for="lastname">Last Name *</label>
<input type="text" id="lastname" name="lastname" required minlength="2" maxlength="30" placeholder="Enter your last name" />
</div>

<div class="form-row">
<label for="email">Email Address *</label>
<input type="text" id="email" name="email" required placeholder="name@example.com" />
</div>

<div class="form-row">
<label for="phone">Phone Number</label>
<input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890" />
</div>

<div class="form-row">
<label for="city">City *</label>
<input type="text" id="city" name="city" required minlength="2" maxlength="40" placeholder="Enter your city" />
</div>

<div class="form-row">
<label for="zip">ZIP Code *</label>
<input type="text" id="zip" name="zip" required placeholder="12345 or 12345-6789" />
</div>

<div class="form-row">
<label for="subject">Subject *</label>
<input type="text" id="subject" name="subject" required minlength="3" maxlength="100" placeholder="Enter a subject" />
</div>

<div class="form-row">
<label for="contactreason">Reason for Contact *</label>
<select id="contactreason" name="contactreason" required>
<option value="">Select one</option>
<option value="general">General Inquiry</option>
<option value="programs">Programs Information</option>
<option value="support">Support Services</option>
<option value="education">Educational Services</option>
<option value="volunteer">Volunteer Opportunities</option>
<option value="donations">Donations</option>
</select>
</div>

<div class="form-row">
<label for="message">Message *</label>
<textarea id="message" name="message" rows="6" required minlength="10" maxlength="500" placeholder="Write your message here"></textarea>
</div>

<div class="checkbox-row">
<input type="checkbox" id="updates" name="updates" />
<label for="updates">I would like to receive updates from the Tacy Foundation.</label>
</div>

<div class="checkbox-row">
<input type="checkbox" id="agreement" name="agreement" required />
<label for="agreement">I confirm that the information provided is correct. *</label>
</div>

<div class="form-buttons">
<input type="submit" value="Submit Form" class="btn-submit" />
<input type="reset" value="Clear Form" class="btn-reset" />
</div>

</form>
</section>
</main>

<footer class="site-footer">
<div class="footer-links">
<a class="footer-link" href="donate.html">Donate</a>
<a class="footer-link" href="search.html">Search</a>
<a class="footer-link" href="subscribeconfirmation.html">Subscribe</a>
</div>
</footer>

</body>
</html>
